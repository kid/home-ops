---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Flux Diff

on:
  pull_request:
    branches:
      - main
    paths:
      - clusters/**
      - kubernetes/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    name: Flux Diff - Prepare
    runs-on: ubuntu-latest
    outputs:
      clusters: ${{ steps.clusters.outputs.clusters }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Discover clusters
        id: clusters
        shell: bash
        run: |
          set -euo pipefail

          python <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import pathlib

          clusters = sorted(
              path.name
              for path in pathlib.Path("clusters").iterdir()
              if path.is_dir()
          )

          print(f"clusters={json.dumps(clusters)}")
          PY

  diff:
    name: Flux Diff - ${{ matrix.cluster }} / ${{ matrix.kind }}
    needs: prepare
    runs-on: home-ops
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJson(needs.prepare.outputs.clusters) }}
        kind:
          - ks
          - hr
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Prepare CI env file
        run: cp .env.gha .env

      - name: Configure Dagger cluster runner
        shell: bash
        env:
          DAGGER_NAMESPACE: actions-runner-system
          DAGGER_ENGINE_LABEL_SELECTOR: name%3Ddagger-dagger-helm-engine
        run: |
          set -euo pipefail

          token_file=/var/run/secrets/kubernetes.io/serviceaccount/token
          ca_file=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

          if [[ ! -r "$token_file" ]]; then
            echo "missing service account token at $token_file" >&2
            exit 1
          fi

          api_server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
          pods_json="$({
            curl --fail --silent --show-error \
              --cacert "$ca_file" \
              -H "Authorization: Bearer $(< "$token_file")" \
              "$api_server/api/v1/namespaces/$DAGGER_NAMESPACE/pods?labelSelector=$DAGGER_ENGINE_LABEL_SELECTOR"
          })"

          pod_name="$({
            printf '%s' "$pods_json" | node -e '
              let input = "";
              process.stdin.on("data", (chunk) => (input += chunk));
              process.stdin.on("end", () => {
                const data = JSON.parse(input);
                const pod =
                  (data.items || []).find((item) => item.status?.phase === "Running") ||
                  (data.items || [])[0];
                if (!pod?.metadata?.name) {
                  console.error("no dagger engine pod found");
                  process.exit(1);
                }
                process.stdout.write(pod.metadata.name);
              });
            '
          })"

          echo "_EXPERIMENTAL_DAGGER_RUNNER_HOST=kube-pod://$pod_name?namespace=$DAGGER_NAMESPACE" >> "$GITHUB_ENV"
          echo "Using Dagger engine pod $pod_name in $DAGGER_NAMESPACE"

      - name: Install Dagger
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: latest
          dagger-flags: --progress=logs
          call: flux-local version

      - name: Prepare PR comment
        id: diff
        shell: bash
        env:
          CLUSTER_PATH: clusters/${{ matrix.cluster }}
          KIND: ${{ matrix.kind }}
        run: |
          set -euo pipefail

          comment_file="$(mktemp)"
          output_file="$(mktemp)"
          dagger call flux-local diff --kind "$KIND" --path "$CLUSTER_PATH" stdout > "$output_file"

          if [[ -z "$(tr -d '[:space:]' < "$output_file")" ]]; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "comment_file=$comment_file" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          max_bytes=60000
          output_bytes="$(wc -c < "$output_file")"

          {
            echo "## Flux diff"
            echo
            echo "- Cluster: \`$CLUSTER_PATH\`"
            echo "- Kind: \`$KIND\`"
            echo
            echo '```diff'
            head -c "$max_bytes" "$output_file"
            if [[ "$output_bytes" -gt "$max_bytes" ]]; then
              printf '\n\n... diff truncated at %s bytes ...\n' "$max_bytes"
            fi
            echo
            echo '```'
          } > "$comment_file"

          echo "has_diff=true" >> "$GITHUB_OUTPUT"
          echo "comment_file=$comment_file" >> "$GITHUB_OUTPUT"

      - name: Update PR comment
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: flux-diff/${{ matrix.cluster }}/${{ matrix.kind }}
          path: ${{ steps.diff.outputs.comment_file }}
          skip_unchanged: true

      - name: Delete stale PR comment
        if: ${{ steps.diff.outputs.has_diff == 'false' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: flux-diff/${{ matrix.cluster }}/${{ matrix.kind }}
          delete: true
