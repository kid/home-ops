---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../kubernetes/apps/external-secrets/
  - ../../../kubernetes/apps/flux-system/
  - ../../../kubernetes/apps/kube-system/
  - ../../../kubernetes/apps/network-system/
  - ../../../kubernetes/apps/observability/
  - ../../../kubernetes/apps/virtualization/
  - ./storage-system/

patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      version: v1
      kind: Kustomization
      name: kubevirt
    patch: |-
      - op: add
        path: /spec/patches
        value:
          - target:
              group: kubevirt.io
              version: v1
              kind: KubeVirt
              name: kubevirt
            patch: |
              - op: replace
                path: /spec/configuration/developerConfiguration/featureGates
                value:
                  - HostDevices
              - op: add
                path: /spec/configuration/permittedHostDevices
                value:
                  pciHostDevices:
                    - pciVendorSelector: "1000:00e6"
                      resourceName: devices.kubevirt.io/sas-hba
