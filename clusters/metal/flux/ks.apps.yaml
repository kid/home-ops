---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-apps
  namespace: flux-system
spec:
  interval: 10m0s
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-values
  patches:
    - patch: |
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: all
        spec:
          postBuild:
            substituteFrom:
              - kind: ConfigMap
                name: cluster-values
      target:
        kind: Kustomization
        namespace: flux-system
  path: ./clusters/metal/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
