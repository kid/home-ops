---
customization:
  extraKernelArgs:
    - talos.dashboard.disabled=1
    - pcie_aspm.policy=powersave
    - cpufreq.default_governor=powersave
    - energy_performance_preference=power
    - amd_iommu=on
    - iommu=pt
  systemExtensions:
    officialExtensions:
      - siderolabs/amd-ucode
      - siderolabs/zfs
      - siderolabs/nfsd
      - siderolabs/nfsrahead
      - siderolabs/drbd
  bootloader: sd-boot
