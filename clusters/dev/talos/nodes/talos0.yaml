---
machine:
  type: controlplane
  install:
    disk: /dev/nvme0n1
    wipe: true
  logging:
    destinations:
      - endpoint: tcp://127.0.0.1:15140/
        format: json_lines
        extraTags:
          talos_node_name: talos0
          talos_node_ip: 10.0.40.200
---
apiVersion: v1alpha1
kind: HostnameConfig
$patch: delete
---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: talos0
---
apiVersion: v1alpha1
kind: LinkAliasConfig
name: net0
selector:
  match: mac(link.permanent_addr) == "d0:50:99:fe:51:b5"
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  minSize: 80GiB
  maxSize: 80GiB
  grow: false
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: local-storage
provisioning:
  minSize: 120GiB
  maxSize: 120GiB
  grow: false
  diskSelector:
    match: "system_disk == true"
