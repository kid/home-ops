machine:
  files:
    - op: overwrite
      path: /etc/nfsmount.conf
      permissions: 0o644
      content: |
        [ NFSMount_Global_Options ]
        nfsvers=4.2
        proto=tcp
        softerr=True
        timeo=10
        retrans=2
        nconnect=16
        rsize=1048576
        wsize=1048576
        noatime=True
