---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ./flux

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: cluster-values
    namespace: flux-system
    envs:
      - ./cluster.env
