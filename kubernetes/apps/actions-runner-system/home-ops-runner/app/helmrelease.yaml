---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-ops-runner
spec:
  chartRef:
    kind: OCIRepository
    name: home-ops-runner
  interval: 1h
  values:
    githubConfigUrl: https://github.com/kid/home-ops
    githubConfigSecret: home-ops-runner-auth-secret
    runnerScaleSetName: home-ops
    minRunners: 0
    maxRunners: 3
    scaleSetLabels:
      - home-ops
      - kubernetes
    controllerServiceAccount:
      namespace: actions-runner-system
      name: actions-runner-controller-gha-rs-controller
    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - ReadWriteOnce
        storageClassName: openebs-hostpath
        resources:
          requests:
            storage: 10Gi
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.334.0@sha256:95d91d7f8d241e319ef2f4fec08f417aa1606b96fbb327643f75c303acd30002
            command:
              - /home/runner/run.sh
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
        securityContext:
          fsGroup: 1001
          fsGroupChangePolicy: OnRootMismatch
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule
