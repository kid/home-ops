---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: virtualization
resources:
  - ./cdi-operator.yaml
  - ./cdi-cr.yaml
patches:
  - target:
      kind: Namespace
      name: cdi
    patch: |-
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: cdi
