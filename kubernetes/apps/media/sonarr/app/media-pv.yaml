---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-series-local
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  local:
    path: /var/mnt/tank/library/series
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - talos0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-series-local
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Ti
  storageClassName: ""
  volumeName: sonarr-series-local
