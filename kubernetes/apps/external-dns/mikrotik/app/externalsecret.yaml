---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name mikrotik-credentials
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword

  dataFrom:
    - extract:
        key: rb5009 - external-dns

  target:
    name: *name
    template:
      data:
        MIKROTIK_BASEURL: "{{ .url }}"
        MIKROTIK_SKIP_TLS_VERIFY: "{{ .insecure }}"
        MIKROTIK_USERNAME: "{{ .username }}"
        MIKROTIK_PASSWORD: "{{ .password }}"
