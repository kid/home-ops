---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app external-dns-mikrotik
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: *app

  values:
    fullnameOverride: *app

    logLevel: info
    logFormat: text

    interval: 1m
    triggerLoopOnEvent: true

    policy: sync

    sources: [gateway-httproute, service]
    managedRecordTypes: [A, CNAME]

    txtOwnerId: prd
    txtPrefix: k8s.prd.

    domainFilters: ["${APP_DOMAIN}", "internal"]
    excludeDomains: [""]

    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/mirceanton/external-dns-provider-mikrotik
          tag: v1.5.17
        env:
          - name: LOG_FORMAT
            value: text
          - name: LOG_LEVEL
            value: info

          - name: MIKROTIK_DEFAULT_COMMENT
            value: "Managed by ExternalDNS"
          - name: MIKROTIK_BASEURL
            value: "https://10.99.0.1"
          - name: MIKROTIK_SKIP_TLS_VERIFY
            value: "true"
          - name: MIKROTIK_PASSWORD
            valueFrom:
              secretKeyRef:
                name: &secret mikrotik-credentials
                key: password
          - name: MIKROTIK_USERNAME
            valueFrom:
              secretKeyRef:
                name: *secret
                key: username

    podAnnotations:
      secret.reloader.stakater.com/reload: *secret
