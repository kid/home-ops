---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: namespace-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: ${ONEPASSWORD_STORE}
  target:
    name: namespace-secrets
    template:
      data:
        CLOUDFLARE_TUNNEL_ID: "{{ .CLOUDFLARE_TUNNEL_ID }}"
  dataFrom:
    - extract:
        key: cloudflare
