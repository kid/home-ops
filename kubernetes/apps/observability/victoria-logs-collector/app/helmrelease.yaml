---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  interval: 1h
  targetNamespace: observability
  values:
    remoteWrite:
      - url: &vmauthUrl http://victoria-logs-vl-vmauth.observability.svc.cluster.local:8427
        maxDiskUsagePerURL: 10GB
    fullnameOverride: vl-collector
    extraArgs:
      tmpDataPath: /var/lib/vl-collector
    collector:
      excludeFilter: kubernetes.pod_name:=%{HOSTNAME}
      includePodLabels: true
      includePodAnnotations: false
      includeNodeLabels: false
      includeNodeAnnotations: false
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
