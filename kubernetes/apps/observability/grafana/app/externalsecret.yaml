---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: ${ONEPASSWORD_STORE}
  target:
    name: grafana-admin-secret
    template:
      data:
        GF_SECURITY_ADMIN_USER: "{{ .username }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: grafana
