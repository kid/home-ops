---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-logs-config
  namespace: observability
data:
  config.alloy: |
    logging {
      level  = "info"
      format = "logfmt"
    }

    otelcol.processor.batch "logs" {
      output {
        logs = [otelcol.exporter.otlphttp.victorialogs.input]
      }
    }

    otelcol.processor.transform "talos_json" {
      error_mode = "ignore"

      log_statements {
        context = "log"
        statements = [
          "merge_maps(attributes, ParseJSON(body), \"upsert\")",
          "set(body, attributes[\"msg\"]) where attributes[\"msg\"] != nil",
          "set(severity_text, attributes[\"talos-level\"]) where attributes[\"talos-level\"] != nil",
          "set(attributes[\"service.name\"], attributes[\"talos-service\"]) where attributes[\"talos-service\"] != nil",
          "set(attributes[\"service.name\"], \"talos\") where attributes[\"service.name\"] == nil",
          "set(attributes[\"service.name\"], \"talos\") where attributes[\"service.name\"] == \"\"",
          "delete_key(attributes, \"msg\")",
          "delete_key(attributes, \"talos-level\")",
          "delete_key(attributes, \"talos-service\")",
          "delete_key(attributes, \"talos-time\")",
          "delete_key(attributes, \"talos_node_name\")",
          "delete_key(attributes, \"talos_node_ip\")",
        ]
      }

      output {
        logs = [otelcol.processor.attributes.talos.input]
      }
    }

    otelcol.processor.attributes "talos" {
      action {
        key    = "cluster"
        value  = "${CLUSTER_NAME}"
        action = "upsert"
      }

      action {
        key    = "node"
        value  = sys.env("ALLOY_NODE_NAME")
        action = "upsert"
      }

      action {
        key    = "log.source"
        value  = "talos"
        action = "upsert"
      }

      action {
        key    = "service.namespace"
        value  = "talos"
        action = "upsert"
      }

      action {
        key    = "host.name"
        value  = sys.env("ALLOY_NODE_NAME")
        action = "upsert"
      }

      action {
        key    = "host.ip"
        value  = sys.env("ALLOY_HOST_IP")
        action = "upsert"
      }

      action {
        key    = "k8s.node.name"
        value  = sys.env("ALLOY_NODE_NAME")
        action = "upsert"
      }

      action {
        key    = "k8s.cluster.name"
        value  = "${CLUSTER_NAME}"
        action = "upsert"
      }

      action {
        key    = "net.host.ip"
        action = "delete"
      }

      action {
        key    = "net.host.name"
        action = "delete"
      }

      action {
        key    = "net.host.port"
        action = "delete"
      }

      action {
        key    = "net.peer.ip"
        action = "delete"
      }

      action {
        key    = "net.peer.name"
        action = "delete"
      }

      action {
        key    = "net.peer.port"
        action = "delete"
      }

      output {
        logs = [otelcol.processor.batch.logs.input]
      }
    }

    otelcol.processor.transform "kubernetes_json" {
      error_mode = "ignore"

      log_statements {
        context = "log"
        statements = [
          "merge_maps(attributes, ParseJSON(body), \"upsert\") where body != \"\" and Substring(body, 0, 1) == \"{\"",
          "set(body, attributes[\"message\"]) where attributes[\"message\"] != nil",
          "set(body, attributes[\"msg\"]) where attributes[\"message\"] == nil and attributes[\"msg\"] != nil",
          "set(body, attributes[\"log\"]) where attributes[\"message\"] == nil and attributes[\"msg\"] == nil and attributes[\"log\"] != nil",
          "set(body, attributes[\"log_message\"]) where attributes[\"message\"] == nil and attributes[\"msg\"] == nil and attributes[\"log\"] == nil and attributes[\"log_message\"] != nil",
        ]
      }

      output {
        logs = [otelcol.processor.attributes.kubernetes_logs.input]
      }
    }

    otelcol.processor.attributes "kubernetes_logs" {
      action {
        key    = "k8s.cluster.name"
        value  = "${CLUSTER_NAME}"
        action = "upsert"
      }

      action {
        key            = "alloy.k8s.pod.uid"
        from_attribute = "pod_uid"
        action         = "upsert"
      }

      action {
        key    = "pod_name"
        action = "delete"
      }

      action {
        key    = "pod_namespace"
        action = "delete"
      }

      action {
        key    = "container_name"
        action = "delete"
      }

      action {
        key    = "pod_uid"
        action = "delete"
      }

      action {
        key    = "restart_count"
        action = "delete"
      }

      action {
        key    = "log.file.path"
        action = "delete"
      }

      output {
        logs = [otelcol.processor.k8sattributes.kubernetes.input]
      }
    }

    otelcol.processor.k8sattributes "kubernetes" {
      auth_type = "serviceAccount"

      extract {
        metadata = [
          "k8s.namespace.name",
          "k8s.pod.name",
          "k8s.pod.uid",
          "k8s.pod.ip",
          "k8s.node.name",
          "k8s.deployment.name",
          "k8s.replicaset.name",
          "k8s.statefulset.name",
          "k8s.job.name",
          "k8s.cronjob.name",
        ]

        otel_annotations = true
      }

      pod_association {
        source {
          from = "resource_attribute"
          name = "alloy.k8s.pod.uid"
        }
      }

      output {
        logs = [otelcol.processor.transform.kubernetes_cleanup.input]
      }
    }

    otelcol.processor.transform "kubernetes_cleanup" {
      error_mode = "ignore"

      log_statements {
        context = "log"
        statements = [
          "delete_key(attributes, \"alloy.k8s.pod.uid\")",
        ]
      }

      log_statements {
        context = "resource"
        statements = [
          "delete_key(attributes, \"alloy.k8s.pod.uid\")",
        ]
      }

      output {
        logs = [otelcol.processor.batch.logs.input]
      }
    }

    otelcol.exporter.otlphttp "victorialogs" {
      client {
        endpoint    = "http://victoria-logs-vl-server.observability.svc.cluster.local:9428/insert/opentelemetry"
        compression = "gzip"
        timeout     = "30s"
      }

      retry_on_failure {
        enabled          = true
        initial_interval = "1s"
        max_interval     = "30s"
        max_elapsed_time = "5m"
      }

      sending_queue {
        enabled       = true
        num_consumers = 4
        queue_size    = 1000
      }
    }

    otelcol.receiver.tcplog "talos" {
      listen_address     = "127.0.0.1:15140"
      max_log_size       = "1MiB"
      one_log_per_packet = false
      encoding           = "utf-8"
      add_attributes     = true

      retry_on_failure {
        enabled          = true
        initial_interval = "1s"
        max_interval     = "30s"
        max_elapsed_time = "5m"
      }

      output {
        logs = [otelcol.processor.transform.talos_json.input]
      }
    }

    otelcol.receiver.filelog "kubernetes" {
      include = ["/var/log/pods/*/*/*.log"]
      exclude = [
        string.format("/var/log/pods/%s_%s_*/alloy/*.log", sys.env("POD_NAMESPACE"), sys.env("POD_NAME")),
      ]
      include_file_path = true
      start_at          = "end"

      retry_on_failure {
        enabled          = true
        initial_interval = "1s"
        max_interval     = "30s"
        max_elapsed_time = "5m"
      }

      operators = [
        {
          type = "container",
        },
        {
          type       = "regex_parser",
          parse_from = "attributes[\"log.file.path\"]",
          regex      = "^/var/log/pods/(?P<pod_namespace>[^_]+)_(?P<pod_name>.+)_(?P<pod_uid>[0-9a-fA-F-]+)/(?P<container_name>[^/]+)/(?P<restart_count>[0-9]+)\\.log$",
        },
      ]

      output {
        logs = [otelcol.processor.transform.kubernetes_json.input]
      }
    }

    otelcol.receiver.filelog "alloy_self" {
      include           = [string.format("/var/log/pods/observability_%s_*/alloy/*.log", sys.env("POD_NAME"))]
      include_file_path = true
      start_at          = "end"

      attributes = {
        cluster                     = "${CLUSTER_NAME}",
        node                        = sys.env("ALLOY_NODE_NAME"),
        "log.source"               = "alloy-self",
        "kubernetes.pod_name"      = sys.env("POD_NAME"),
        "kubernetes.pod_namespace" = sys.env("POD_NAMESPACE"),
        "kubernetes.container_name" = "alloy",
      }

      resource = {
        "service.name"       = "alloy-logs",
        "service.namespace"  = sys.env("POD_NAMESPACE"),
        "service.instance.id" = sys.env("POD_NAME"),
        "host.name"          = sys.env("ALLOY_NODE_NAME"),
        "k8s.cluster.name"   = "${CLUSTER_NAME}",
        "k8s.namespace.name" = sys.env("POD_NAMESPACE"),
        "k8s.pod.name"       = sys.env("POD_NAME"),
        "k8s.container.name" = "alloy",
        "k8s.node.name"      = sys.env("ALLOY_NODE_NAME"),
      }

      retry_on_failure {
        enabled          = true
        initial_interval = "1s"
        max_interval     = "30s"
        max_elapsed_time = "5m"
      }

      output {
        logs = [otelcol.processor.batch.logs.input]
      }
    }
