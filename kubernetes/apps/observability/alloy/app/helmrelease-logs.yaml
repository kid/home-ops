---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: alloy
  targetNamespace: observability
  values:
    fullnameOverride: alloy-logs
    service:
      enabled: false
    alloy:
      stabilityLevel: experimental
      extraEnv:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ALLOY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      extraPorts:
        - name: talos-tcplog
          port: 15140
          targetPort: 15140
          protocol: TCP
      mounts:
        varlog: true
      configMap:
        create: false
        name: alloy-logs-config
        key: config.alloy
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    controller:
      type: daemonset
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
