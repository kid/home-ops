---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy-logs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: alloy
  targetNamespace: observability
  values:
    fullnameOverride: alloy-logs
    service:
      enabled: false
    rbac:
      rules:
        - apiGroups: ["", "discovery.k8s.io", "networking.k8s.io"]
          resources: ["endpoints", "endpointslices", "ingresses", "pods", "services"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods", "pods/log", "namespaces"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["monitoring.grafana.com"]
          resources: ["podlogs"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["monitoring.coreos.com"]
          resources: ["prometheusrules"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["monitoring.coreos.com"]
          resources: ["alertmanagerconfigs"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["monitoring.coreos.com"]
          resources: ["podmonitors", "servicemonitors", "probes", "scrapeconfigs"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["configmaps", "secrets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["apps", "extensions"]
          resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["batch"]
          resources: ["jobs", "cronjobs"]
          verbs: ["get", "list", "watch"]
    alloy:
      stabilityLevel: experimental
      extraEnv:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ALLOY_NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: ALLOY_HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
      extraPorts:
        - name: talos-tcplog
          port: 15140
          targetPort: 15140
          protocol: TCP
      mounts:
        varlog: true
      configMap:
        create: false
        name: alloy-logs-config
        key: config.alloy
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    controller:
      type: daemonset
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
