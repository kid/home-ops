---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  releaseName: victoria-metrics
  targetNamespace: observability
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  dependsOn:
    - name: prometheus-operator-crds
  interval: 1h
  values:
    fullnameOverride: victoria-metrics
    victoria-metrics-operator:
      admissionWebhooks:
        policy: Ignore
        certManager:
          enabled: true
    defaultDashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              dashboards: grafana
    external:
      grafana:
        datasource: VictoriaMetrics
        host: https://grafana.${APP_DOMAIN}
    grafana:
      enabled: false
    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
    kubeProxy:
      enabled: false
    vmsingle:
      enabled: true
      spec:
        replicaCount: 1
        retentionPeriod: 14d
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: linstor-zfs-ssd
