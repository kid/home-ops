---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  releaseName: victoria-metrics
  targetNamespace: observability
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  dependsOn:
    - name: prometheus-operator-crds
  interval: 1h
  values:
    fullnameOverride: victoria-metrics
    victoria-metrics-operator:
      admissionWebhooks:
        policy: Ignore
        certManager:
          enabled: true
    defaultDashboards:
      enabled: true
      grafanaOperator:
        enabled: true
        spec:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              dashboards: grafana
    external:
      grafana:
        datasource: VictoriaMetrics
        host: https://grafana.${APP_DOMAIN}
    grafana:
      enabled: false
    kubeEtcd:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: http
      service:
        port: 2381
        selector:
          component: kube-apiserver
        targetPort: 2381
    kubeApiServer:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: https
              scheme: https
              max_scrape_size: "33554432"
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                serverName: kubernetes
    kubeControllerManager:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecureSkipVerify: true
    kubeScheduler:
      vmScrape:
        spec:
          endpoints:
            - bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
              port: http-metrics
              scheme: https
              tlsConfig:
                caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecureSkipVerify: true
    kubeProxy:
      enabled: false
    kubelet:
      vmScrape:
        spec:
          metricRelabelConfigs:
            - action: labeldrop
              regex: (uid)
            - action: labeldrop
              regex: (id|name)
            - action: drop
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
              source_labels:
                - __name__
            - action: labeldrop
              regex: (beta_kubernetes_io_.+|kubernetes_io_.+|kubevirt_io_.+|cpu_feature_node_kubevirt_io_.+|host_model_required_features_node_kubevirt_io_.+|machine_type_node_kubevirt_io_.+|hyperv_node_kubevirt_io_.+|scheduling_node_kubevirt_io_.+)
          relabelConfigs:
            - sourceLabels:
                - __meta_kubernetes_node_name
              targetLabel: node
            - sourceLabels:
                - __metrics_path__
              targetLabel: metrics_path
            - targetLabel: job
              replacement: kubelet
    vmsingle:
      enabled: true
      spec:
        replicaCount: 1
        retentionPeriod: 14d
        storage:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: linstor-zfs-ssd
    vmagent:
      spec:
        resources:
          limits:
            cpu: 500m
