---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: victoria-metrics
  labels:
    home-ops.io/skip-cluster-values-substitute-from: "true"
spec:
  dependsOn:
    - name: cert-manager
      namespace: network-system
    - name: external-secrets
      namespace: external-secrets
    - name: grafana-operator
    - name: prometheus-operator-crds
    - name: piraeus-operator
      namespace: storage-system
    - name: volsync
      namespace: storage-system
  interval: 1h
  path: ./kubernetes/apps/observability/victoria-metrics/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
  components:
    - ../../../../components/volsync-nopvc/
  postBuild:
    substitute:
      APP: victoria-metrics
      VOLSYNC_PVC: vmsingle-victoria-metrics
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_PUID: "0"
      VOLSYNC_PGID: "0"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-values
        optional: false
      - kind: Secret
        name: alertmanager-telegram-secrets
        optional: true
