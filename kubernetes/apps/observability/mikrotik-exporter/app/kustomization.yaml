---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: mktxp-config
    files:
      - files/_mktxp.yaml
      - files/mktxp.yaml

resources:
  - helmrelease.yaml
  - ocirepository.yaml
  - externalsecret.yaml

  - grafana/folder.yaml
  - grafana/dashboard.yaml
