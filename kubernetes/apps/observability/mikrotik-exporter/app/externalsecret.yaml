---
# yaml-language-server: $schema=https://k8s-schemas.mirceanton.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mktxp-credentials
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore

  target:
    name: mktxp-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        rb5009.yaml: |
          username: {{ .rb5009_username }}
          password: {{ .rb5009_password }}
        crs320.yaml: |
          username: {{ .crs320_username }}
          password: {{ .crs320_password }}

  data:
    - secretKey: rb5009_username
      remoteRef:
        key: RB5009 - metrics/username
    - secretKey: rb5009_password
      remoteRef:
        key: RB5009 - metrics/password
    - secretKey: crs320_username
      remoteRef:
        key: CRS320 - metrics/username
    - secretKey: crs320_password
      remoteRef:
        key: CRS320 - metrics/password
