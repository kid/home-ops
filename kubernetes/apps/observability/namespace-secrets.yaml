---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: namespace-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: ${ONEPASSWORD_STORE}
  target:
    name: namespace-secrets
    template:
      data:
        TELEGRAM_CHAT_ID: "{{ .TELEGRAM_CHAT_ID }}"
  dataFrom:
    - extract:
        key: ${CLUSTER_NAME}.telegram.bot
