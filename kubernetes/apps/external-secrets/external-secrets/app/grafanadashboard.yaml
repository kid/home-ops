---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: external-secrets
spec:
  allowCrossNamespaceImport: true
  configMapRef:
    name: external-secrets-dashboard
    key: external-secrets.json
  folder: external-secrets
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
