---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-credentials
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: onepassword-connect-credentials-secret
    template:
      data:
        1password-credentials.json: '{{ .OP_SESSION_JSON }}'
  dataFrom:
    - extract:
        key: onepassword - "${CLUSTER_NAME}"
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: onepassword-connect-token
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: onepassword-connect-token-secret
    template:
      data:
        token: '{{ .OP_CONNECT_TOKEN }}'
  dataFrom:
    - extract:
        key: onepassword - "${CLUSTER_NAME}"
