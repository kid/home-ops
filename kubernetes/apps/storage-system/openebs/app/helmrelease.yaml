---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: openebs
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: openebs-zfs-localpv-controller
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: openebs-zfs-localpv-controller
              spec:
                template:
                  spec:
                    containers:
                      - name: snapshot-controller
                        $patch: delete
  values:
    localpv-provisioner:
      analytics:
        enabled: false
      localpv:
        basePath: &hostPath /var/mnt/local-storage
      hostpathClass:
        enabled: true
        name: openebs-hostpath
        isDefaultClass: false
        basePath: *hostPath
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: true
        rawfile:
          enabled: false
      replicated:
        mayastor:
          enabled: false
    loki:
      enabled: false
    alloy:
      enabled: false
    preUpgradeHook:
      enabled: false
    openebs-crds:
      csi:
        volumeSnapshots:
          enabled: false
    zfs-localpv:
      crds:
        csi:
          volumeSnapshots:
            enabled: false
