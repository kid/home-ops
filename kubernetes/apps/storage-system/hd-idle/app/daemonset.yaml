---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hd-idle
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hd-idle
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hd-idle
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos0
      tolerations:
        - operator: Exists
      containers:
        - name: hd-idle
          image: docker.io/library/debian:trixie-slim@sha256:4e401d95de7083948053197a9c3913343cd06b706bf15eb6a0c3ccd26f436a0e
          command: ["/bin/sh", "-ec"]
          args:
            - |
              apt-get update
              apt-get install -y --no-install-recommends hd-idle
              exec /usr/sbin/hd-idle -d -i 1800
          securityContext:
            privileged: true
          volumeMounts:
            - name: dev
              mountPath: /dev
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
