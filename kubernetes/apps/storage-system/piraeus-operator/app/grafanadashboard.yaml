---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: linbit-sds
spec:
  allowCrossNamespaceImport: true
  configMapRef:
    name: linbit-sds-dashboard
    key: linbit-sds-dashboard.json
  folder: storage-system
  instanceSelector:
    matchLabels:
      dashboards: grafana
  resyncPeriod: 10m
