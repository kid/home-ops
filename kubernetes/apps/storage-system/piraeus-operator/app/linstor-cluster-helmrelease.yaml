---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linstor-cluster
spec:
  chartRef:
    kind: OCIRepository
    name: linstor-cluster
  dependsOn:
    - name: piraeus-operator
      namespace: storage-system
  interval: 1h
  values:
    monitoring:
      enabled: true
      dashboard:
        enabled: true
    linstorCluster:
      controller:
        podTemplate:
          spec:
            containers:
              - name: linstor-controller
                env:
                  - name: JAVA_OPTS
                    value: -Djdk.tls.acknowledgeCloseNotify=true -Xms256m -Xmx512m
                resources:
                  requests:
                    cpu: 100m
                    memory: 512Mi
                  limits:
                    memory: 1Gi
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    linstorSatelliteConfigurations:
      - name: zfs-pool
        storagePools:
          - name: ssd
            zfsPool:
              zPool: ssd/piraeus
            properties:
              - name: StorDriver/ZfscreateOptions
                value: -o volblocksize=4K
            source:
              hostDevices:
                - /dev/vdb

      - name: talos-loader-override
        podTemplate:
          spec:
            initContainers:
              - name: drbd-shutdown-guard
                $patch: delete
              - name: drbd-module-loader
                $patch: delete
            volumes:
              - name: run-systemd-system
                $patch: delete
              - name: run-drbd-shutdown-guard
                $patch: delete
              - name: systemd-bus-socket
                $patch: delete
              - name: lib-modules
                $patch: delete
              - name: usr-src
                $patch: delete
              - name: etc-lvm-backup
                hostPath:
                  path: /var/etc/lvm/backup
                  type: DirectoryOrCreate
              - name: etc-lvm-archive
                hostPath:
                  path: /var/etc/lvm/archive
                  type: DirectoryOrCreate
    storageClasses:
      - name: linstor-zfs-ssd
        allowVolumeExpansion: true
        volumeBindingMode: WaitForFirstConsumer
        reclaimPolicy: Delete
        provisioner: linstor.csi.linbit.com
        parameters:
          linstor.csi.linbit.com/storagePool: ssd
          linstor.csi.linbit.com/placementCount: "3"

    volumeSnapshotClasses:
      - name: linstor-zfs
        driver: linstor.csi.linbit.com
        deletionPolicy: Delete
