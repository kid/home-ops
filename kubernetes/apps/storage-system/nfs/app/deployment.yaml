---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nfs
    spec:
      priorityClassName: nfs-storage-critical
      nodeSelector:
        kubernetes.io/hostname: talos0
      containers:
        - name: nfs
          image: quay.io/aminvakil/alpine-nfs-server:latest
          env:
            - name: SHARED_DIRECTORY
              value: /var/mnt/tank
            - name: SYNC
              value: "true"
            - name: PERMITTED
              value: "*"
          ports:
            - name: nfs
              containerPort: 2049
              protocol: TCP
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - showmount -e 127.0.0.1 2>/dev/null | grep -qE '^/var/mnt/tank([[:space:]]|$)'
          readinessProbe: &probe
            tcpSocket:
              port: nfs
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 2
            successThreshold: 1
          livenessProbe: *probe
          securityContext:
            privileged: true
          volumeMounts:
            - name: nfsshare
              mountPath: /var/mnt/tank
      volumes:
        - name: nfsshare
          hostPath:
            path: /var/mnt/tank
            type: Directory
