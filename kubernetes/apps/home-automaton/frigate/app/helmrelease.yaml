---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  chartRef:
    kind: OCIRepository
    name: frigate
  interval: 1h
  values:
    controllers:
      frigate:
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.17.1
            envFrom:
              - secretRef:
                  name: frigate-reolink-doorbell-secret
              - secretRef:
                  name: frigate-reolink-litters-secret
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        type: ClusterIP
        ports:
          http:
            port: 5000
          rtsp:
            port: 8554
    route:
      app:
        hostnames:
          - frigate.kidibox.net
        parentRefs:
          - name: envoy-internal
            namespace: network-system
    configMaps:
      config:
        data:
          config.yml: |-
            mqtt:
              enabled: true
              host: mqtt.home-automaton.svc
              port: 8883
              tls_ca_certs: /mqtt-client/ca.crt
              tls_client_cert: /mqtt-client/tls.crt
              tls_client_key: /mqtt-client/tls.key
            go2rtc:
              streams:
                doorbell_main:
                  - rtsp://{FRIGATE_REOLINK_USERNAME}:{FRIGATE_REOLINK_PASSWORD}@10.0.50.10:554/h264Preview_01_main
                doorbell_sub:
                  - rtsp://{FRIGATE_REOLINK_USERNAME}:{FRIGATE_REOLINK_PASSWORD}@10.0.50.10:554/h264Preview_01_sub
                litters_main:
                  - rtsp://{FRIGATE_REOLINK_LITTERS_USERNAME}:{FRIGATE_REOLINK_LITTERS_PASSWORD}@10.0.50.11:554/h264Preview_01_main
                litters_sub:
                  - rtsp://{FRIGATE_REOLINK_LITTERS_USERNAME}:{FRIGATE_REOLINK_LITTERS_PASSWORD}@10.0.50.11:554/h264Preview_01_sub
            cameras:
              doorbell:
                ffmpeg:
                  inputs:
                    - path: rtsp://127.0.0.1:8554/doorbell_main
                      input_args: preset-rtsp-restream
                      roles: [record]
                    - path: rtsp://127.0.0.1:8554/doorbell_sub
                      input_args: preset-rtsp-restream
                      roles: [detect]
              litters:
                ffmpeg:
                  inputs:
                    - path: rtsp://127.0.0.1:8554/litters_main
                      input_args: preset-rtsp-restream
                      roles: [record]
                    - path: rtsp://127.0.0.1:8554/litters_sub
                      input_args: preset-rtsp-restream
                      roles: [detect]
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: linstor-zfs-virtio
        size: 1Gi
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: linstor-zfs-virtio
        size: 20Gi
        globalMounts:
          - path: /media/frigate
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/config.yml
            subPath: config.yml
      mqtt-client:
        type: secret
        name: frigate-mqtt-client
        globalMounts:
          - path: /mqtt-client
            readOnly: true
