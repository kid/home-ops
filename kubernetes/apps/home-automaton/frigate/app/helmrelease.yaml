---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frigate
spec:
  chartRef:
    kind: OCIRepository
    name: frigate
  interval: 1h
  values:
    controllers:
      frigate:
        containers:
          app:
            image:
              repository: ghcr.io/blakeblackshear/frigate
              tag: 0.15.2
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    service:
      app:
        type: ClusterIP
        ports:
          http:
            port: 5000
          rtsp:
            port: 8554
    configMaps:
      config:
        data:
          config.yml: |-
            mqtt:
              enabled: true
              host: mqtt.home-automaton.svc
              port: 8883
              tls_ca_certs: /mqtt-client/ca.crt
              tls_client_cert: /mqtt-client/tls.crt
              tls_client_key: /mqtt-client/tls.key
            cameras: {}
    persistence:
      config:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: linstor-zfs-virtio
        size: 1Gi
        globalMounts:
          - path: /config
      media:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        storageClass: linstor-zfs-virtio
        size: 20Gi
        globalMounts:
          - path: /media/frigate
      config-file:
        type: configMap
        identifier: config
        globalMounts:
          - path: /config/config.yml
            subPath: config.yml
      mqtt-client:
        type: secret
        name: frigate-mqtt-client
        globalMounts:
          - path: /mqtt-client
            readOnly: true
