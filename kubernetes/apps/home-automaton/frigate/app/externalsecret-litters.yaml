---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-reolink-litters
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: frigate-reolink-litters-secret
    template:
      data:
        FRIGATE_REOLINK_LITTERS_USERNAME: "{{ .username }}"
        FRIGATE_REOLINK_LITTERS_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: reolink-litters
