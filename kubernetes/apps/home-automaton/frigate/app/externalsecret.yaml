---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frigate-reolink-doorbell
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: frigate-reolink-doorbell-secret
    template:
      data:
        FRIGATE_REOLINK_USERNAME: "{{ .username }}"
        FRIGATE_REOLINK_PASSWORD: "{{ .password }}"
  dataFrom:
    - extract:
        key: reolink-doorbell
