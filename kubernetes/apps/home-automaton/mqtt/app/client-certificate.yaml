---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: frigate-mqtt-client
spec:
  commonName: frigate
  issuerRef:
    kind: Issuer
    name: mqtt-ca
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: frigate-mqtt-client
  usages:
    - client auth
