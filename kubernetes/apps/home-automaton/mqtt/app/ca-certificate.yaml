---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mqtt-ca
spec:
  commonName: mqtt-ca
  isCA: true
  issuerRef:
    kind: Issuer
    name: mqtt-selfsigned
  privateKey:
    algorithm: ECDSA
    size: 256
  secretName: mqtt-ca
